<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MailMuse — AI Work Email Assistant</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0b1020;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:160px;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#7c9cff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:25px;
padding:20px;
background:#121934;
border-radius:10px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>MailMuse</h1>
<p>AI Work Email Assistant</p>

<label>Describe your email situation</label>

<textarea id="situation" placeholder="Example: I sent a quotation two weeks ago and the client hasn't replied. I want to follow up politely."></textarea>

<br>

<button onclick="generateEmail()">Generate Email</button>

<div class="result" id="result">
Your generated email will appear here.
</div>

</div>

<script>

async function generateEmail(){

const situation=document.getElementById("situation").value

if(!situation){
alert("Please describe the situation")
return
}

document.getElementById("result").innerText="Generating..."

const response=await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
audience:"Client",
selectedScenario:"General follow-up",
detectedScenario:"General follow-up",
finalScenario:"General follow-up",
situation:situation,
tone:"Professional",
length:"Medium",
senderName:"",
recipientName:"",
requestedOutputLanguage:"Not specified"
})

})

const data=await response.json()

if(!response.ok){
document.getElementById("result").innerText="Error: "+data.error
return
}

document.getElementById("result").innerText=data.email

}

</script>

</body>
</html>
